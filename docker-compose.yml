---
services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss-test
    env_file:
      - .env
    ports:
      - "8080:80"
    tmpfs:
      - /var/www/FreshRSS/data
    environment:
      TZ: UTC
      FRESHRSS_INSTALL: |
        --api-enabled
        --base-url http://localhost:8080
        --default-user ${STARFEED_RSS_USER}
      FRESHRSS_USER: |
        --user ${STARFEED_RSS_USER}
        --password ${STARFEED_RSS_PASS}
        --email test@example.net
        --api-password ${STARFEED_RSS_API_TOKEN}
        --language en
    healthcheck:
      test: ["CMD", "cli/health.php"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  starfeed:
    image: localhost/starfeed:latest
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      freshrss:
        condition: service_healthy
    env_file:
      - .env
