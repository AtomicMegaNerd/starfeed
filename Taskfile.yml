---
version: "3"

dotenv: [./.env]

env:
  out: bin/starfeed
  src: ./cmd/
  grc: $(if command -v grc > /dev/null; then echo "grc"; else echo ""; fi)
  cover_out: cover.out
  exclude_packages: "mocks|cmd"
  coverage_threshold: 80
  CGO_ENABLED: "0"

tasks:
  clean:
    cmds:
      - rm -f {{.out}} {{.cover_out}}

  check-deps:
    cmds:
      - go mod tidy
      - go mod verify

  build:
    deps: [check-deps]
    sources:
      - "**/*.go"
      - exclude: "**/*_test.go"
      - go.mod
      - go.sum
    generates:
      - "{{.out}}"
    cmds:
      - cmd: go build -o {{.out}} {{.src}}
      - cmd: codesign -f -s "RCD Local" {{.out}} --deep
        platforms: [darwin] # Only sign the binary on macOS.

  run:
    deps: [build]
    cmds:
      - cmd: ./{{.out}}

  test:
    cmds:
      - |
        {{.grc}} go test $(go list ./... | grep -Ev "{{.exclude_packages}}") -race \
        -v -coverprofile={{.cover_out}}
    env:
      CGO_ENABLED: "1"

  lint:
    cmds:
      - golangci-lint run --fix ./...

  update-deps:
    cmds:
      - go get -u ./...
